<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Get an instant price estimate for windshield replacement, side glass, or rear window repair. Affordable auto glass services by Almin Auto Glass Specialist."
    />
    <meta
      name="keywords"
      content="auto glass quote, windshield replacement estimate, side glass repair cost, rear window replacement price, Almin Auto Glass Specialist"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Instant Auto Glass Quote | Almin Auto Glass Specialist</title>
  </head>
  <body>
    <header class="hero-section p-0">
      <img
        src="./Images/IMG_Island.png"
        alt="Almin Auto Glass logo"
        class="img-fluid w-100"
      />
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Almin Auto Glass Specialist</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#alminMenu"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navebar-collapse d-lg-flex" id="alminMenu">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about.html">About Us</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="product_and_services.html">Products and Services</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact Us</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="quote.html">Get a Quote</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-7 col-md-10">
          <div class="glass-card p-5 shadow-2xl">
            <h1
              class="text-center fw-bold mb-2 d-flex align-items-center justify-content-center"
            >
              <img
                src="/Images/vi_flag.png"
                class="flag-logo mx-3"
                style="width: 90px"
                alt="USVI Flag"
              />
              Almin Auto Glass
              <img
                src="/Images/vi_flag.png"
                class="flag-logo mx-3"
                style="width: 90px"
                alt="USVI Flag"
                transform="scaleX(-1);"
              />
            </h1>
            <p class="text-center mb-4 opacity-75">Instant Estimate Tool</p>

            <div class="d-flex flex-wrap justify-content-center gap-2 mb-4">
              <span
                class="badge rounded-pill quick-tag p-2"
                onclick="setQuickText('Front Windshield')"
                >+ Front Windshield</span
              >
              <span
                class="badge rounded-pill quick-tag p-2"
                onclick="setQuickText('Side Door Glass')"
                >+ Side Glass</span
              >
              <span
                class="badge rounded-pill quick-tag p-2"
                onclick="setQuickText('Rear Windshield')"
                >+ Rear Glass</span
              >
            </div>

            <div class="input-group mb-3">
              <input
                type="text"
                id="customer-question"
                class="form-control custom-input"
                placeholder="Enter Year, Make, and Model..."
              />
              <button class="btn btn-quote-custom" onclick="getEstimate()">  
                Get Quote
              </button>
            </div>

            <div id="answer-display" class="p-4 mt-4"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="bot.js"></script>
    <script>
      // Helper function for the quick buttons
      function setQuickText(type) {
        const input = document.getElementById("customer-question");
        input.value = "2020 Honda Civic " + type; // Example text
        input.focus();
      }
    </script>
    <script src="bot.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
